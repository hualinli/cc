<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>工作台 - 智慧监考系统</title>
    <link rel="stylesheet" href="/css/all.min.css">
    <link rel="stylesheet" href="/css/proctor.css">
</head>

<body>
    <nav class="navbar">
        <div class="logo">
            <i class="fa-solid fa-eye"></i>
            <span>智慧监考系统</span>
        </div>
        <div class="user-info">
            <span id="usernameDisplay">监考员</span>
            <button onclick="openPasswordModal()" class="action-btn"
                style="border:none; cursor:pointer; font-family:inherit; background:transparent; color:#9ca3af; margin-right: 15px;">
                <i class="fa-solid fa-key"></i> 修改密码
            </button>
            <button onclick="logout()" class="logout-btn" style="border:none; cursor:pointer; font-family:inherit;">
                <i class="fa-solid fa-right-from-bracket"></i> 退出登录
            </button>
        </div>
    </nav>

    <div class="container">
        <header class="header">
            <h1>选择监考节点</h1>
            <p>请从下方选择对应的监考节点进入工作状态。</p>
        </header>

        <div id="nodeGrid" class="node-grid">
            <!-- 节点将通过 JavaScript 动态加载 -->
            <div class="empty-state">
                <i class="fa-solid fa-circle-notch fa-spin" style="font-size: 2rem; color: var(--primary-color);"></i>
                <p style="margin-top: 1rem;">正在加载节点列表...</p>
            </div>
        </div>
    </div>

    <div id="loadingOverlay" class="loading-overlay">
        <div style="text-align: center;">
            <div class="spinner"></div>
            <p style="margin-top: 1rem; font-weight: 600;">正在分配节点，请稍候...</p>
        </div>
    </div>

    <!-- 修改密码弹窗 -->
    <div id="passwordModal" class="modal-overlay">
        <div class="modal">
            <h2 style="margin-bottom: 20px; font-size: 1.25rem;">修改登录密码</h2>
            <div class="form-group">
                <label>旧密码</label>
                <input type="password" id="oldPassword" placeholder="请输入旧密码"
                    style="width: 100%; padding: 10px; margin-top: 5px; border: 1px solid var(--border-color); border-radius: 4px;">
            </div>
            <div class="form-group" style="margin-top: 15px;">
                <label>新密码</label>
                <input type="password" id="newPassword" placeholder="请输入新密码"
                    style="width: 100%; padding: 10px; margin-top: 5px; border: 1px solid var(--border-color); border-radius: 4px;">
            </div>
            <div class="form-group" style="margin-top: 15px;">
                <label>确认新密码</label>
                <input type="password" id="confirmPassword" placeholder="请再次输入新密码"
                    style="width: 100%; padding: 10px; margin-top: 5px; border: 1px solid var(--border-color); border-radius: 4px;">
            </div>
            <div style="display: flex; gap: 10px; margin-top: 25px;">
                <button onclick="closePasswordModal()"
                    style="flex: 1; padding: 10px; border-radius: 4px; border: 1px solid var(--border-color); background: #f3f4f6; cursor: pointer;">取消</button>
                <button onclick="submitPasswordChange()"
                    style="flex: 1; padding: 10px; border-radius: 4px; border: none; background: var(--primary-color); color: white; cursor: pointer;">确认修改</button>
            </div>
        </div>
    </div>

    <style>
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.5);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal {
            background: white;
            padding: 2rem;
            border-radius: 0.75rem;
            width: 90%;
            max-width: 400px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
        }
    </style>

    <script src="/js/proctor.js?v=1.0.1"></script>
</body>

</html>
